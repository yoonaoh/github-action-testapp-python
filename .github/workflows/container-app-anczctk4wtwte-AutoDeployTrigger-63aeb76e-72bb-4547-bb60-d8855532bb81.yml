name: Trigger auto deployment for container-app-anczctk4wtwte

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/container-app-anczctk4wtwte-AutoDeployTrigger-63aeb76e-72bb-4547-bb60-d8855532bb81.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CONTAINERAPPANCZCTK4WTWTE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPPANCZCTK4WTWTE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPPANCZCTK4WTWTE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: containerregistryanczctk4wtwte.azurecr.io
          registryUsername: ${{ secrets.CONTAINERAPPANCZCTK4WTWTE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPPANCZCTK4WTWTE_REGISTRY_PASSWORD }}
          containerAppName: container-app-anczctk4wtwte
          resourceGroup: githubactiontestapppythonb446
          imageToBuild: containerregistryanczctk4wtwte.azurecr.io/container-app-anczctk4wtwte:${{ github.sha }}
          


